name: Bangumi Date Processing

on:
  workflow_dispatch:
  schedule:
    - cron: '10 21 * * 2'

jobs:
  Bangumi_Date_Processing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run program
        run: ./build/BangumiDateProcessing

      - name: Copy database files to workspace
        run: cp build/*.db .

      - name: Set release variables
        id: release_vars
        run: |
          TAG="$(date -u +'%Y%m%d-%H%M%S')"
          NAME="$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_vars.outputs.tag }}
          name: ${{ steps.release_vars.outputs.name }}
          body: ${{ steps.release_vars.outputs.name }}
          artifacts: "*.db"
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: |
          cat > latest.json <<EOF
          {
            "public_date_1": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_1.db",
            "public_date_2": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_2.db",
            "public_date_4": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_4.db",
            "public_date_12": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_12.db",
            "public_date_14": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_14.db",
            "public_date_24": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_24.db",
            "public_date_124": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_vars.outputs.tag }}/public_date_124.db"
          }
          EOF

      - name: Commit latest.json to repository
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin $BRANCH_NAME
          git checkout $BRANCH_NAME
          git add latest.json
          git commit -m "Update latest.json"
          git push origin $BRANCH_NAME
